device: cuda:0

diffusion:
  type: CSDI_MultiPatch_Weaver_Parallel
  layers: 3
  channels: 64
  nheads: 8
  diffusion_embedding_dim: 128
  is_linear: False  # linear transformer

  # multi-patch
  L_patch_len: 3
  multipatch_num: 3
  attention_mask_type: parallel
  n_var: 1
  
  beta_start: 0.0001
  beta_end: 0.5
  schedule: "quad"

  num_steps: 50

  # edit
  edit_steps: 50  # the number of steps to perform editing
  bootstrap_ratio: 0.5   # [0,1]
  
  ### this useless
  is_attr_proj: False

  attr_proj_type: avg
  strength_control:
    enabled: true
    mode: amplitude_decomposition
    num_strength_bins: 3
    num_tasks: 8
    emb_dim: 32
    hidden_dim: 64
    out_dim: 64
    use_text_context: true
    use_task_id: false
    text_dim: 64
    text_num_buckets: 4096
    dropout: 0.0
    diffusion_loss_weight: 0.2
    edit_region_loss_weight: 0.5
    background_loss_weight: 0.2
    monotonic_loss_weight: 0.5
    monotonic_margin: 0.001
    gain_match_loss_weight: 4.0
    family_relative_gain_loss_weight: 3.0
    family_relative_margin_scale: 1.5
    constant_gain_penalty_weight: 2.0
    minimum_family_gain_std: 0.05
    numeric_only_loss_weight: 4.0
    beta_direction_loss_weight: 0.0
    beta_direction_margin: 0.0
    beta_direction_target: family_signed_gain
  ##### attr projector: deprecated
  attr_heads: 8
  attr_layers: 2
  n_attrs: 2

side:
  num_var: 1
  var_emb: 16
  time_emb: 128
  
attrs:
  attr_emb: 64
  num_attr_ops: [4, 2, 4]  # number of options for each attribute

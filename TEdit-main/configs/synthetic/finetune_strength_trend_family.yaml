### Dataset ###
data:
  name: discrete_strength_family
  folder: ./datasets/discrete_strength_trend_family


### Finetune ###
train:
  epochs: 10
  batch_size: 4
  lr: 1.0e-5
  itr_per_epoch: 1.0e+8
  model_path:
  output_folder: finetune
  val_epoch_interval: 1
  display_interval: 1
  include_self: false
  freeze_backbone_for_strength: false
  instruction_text_dropout_prob: 0.0
  strength_lr_scale: 5.0
  strength_diagnostics_enabled: true
  strength_diagnostics_interval: 20
  run_generation_eval: false
  skip_final_evaluate: true
  ctrl_attrs: [[trend_injection]]

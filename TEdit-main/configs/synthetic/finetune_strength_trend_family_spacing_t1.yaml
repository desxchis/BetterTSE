### Dataset ###
data:
  name: discrete_strength_family
  folder: ./datasets/discrete_strength_trend_family


### Finetune ###
train:
  epochs: 10
  batch_size: 4
  lr: 1.0e-5
  enable_strength_control: true
  itr_per_epoch: 1.0e+8
  model_path:
  output_folder: finetune
  val_epoch_interval: 1
  display_interval: 1
  include_self: false
  freeze_backbone_for_strength: false
  beta_only_repair: false
  reset_beta_output_head: false
  instruction_text_dropout_prob: 0.0
  strength_lr_scale: 10.0
  strength_diagnostics_enabled: true
  strength_diagnostics_interval: 1
  diffusion_loss_weight: 0.2
  gain_match_loss_weight: 6.0
  family_gap_match_loss_weight: 2.0
  edit_region_loss_weight: 0.5
  background_loss_weight: 0.2
  monotonic_loss_weight: 2.0
  family_relative_gain_loss_weight: 3.0
  family_relative_margin_scale: 1.5
  constant_gain_penalty_weight: 2.0
  minimum_family_gain_std: 0.05
  numeric_only_loss_weight: 4.0
  beta_direction_loss_weight: 0.0
  beta_direction_margin: 0.0
  beta_direction_target: family_signed_gain
  strength_control:
    output_branch_carrier:
      enabled: true
      mode: skip_residual_mix
      skip_scale: 0.2
      min_residual_to_skip_ratio: 0.1
      regularizer_weight: 0.5
      scalar_order_margin: 0.002
      scalar_order_weight: 0.5
    final_output_strength_scale:
      enabled: false
    final_output_strength_mapping:
      enabled: true
      mode: bounded_scalar_gain
      scalar_center: 1.0
      scalar_prior_scale: 0.08
      learned_max_delta: 0.08
      min_gain: 0.85
      max_gain: 1.15
      hidden_dim: 64
      gain_order_margin: 0.02
      gain_order_weight: 0.3
      gain_order_direction: increasing
      scope: edit_region
      scalar_transform:
        enabled: true
        scale: 2.0
        offset: 0.0
        name: current_0_0p5_1_to_legacy_0_1_2
  run_generation_eval: false
  skip_final_evaluate: true
  strength_debug:
    compare_raw_and_final: true
    projector_modulation_scalars: true
    validate_family_invariants: true
  ctrl_attrs: [[trend_injection]]
